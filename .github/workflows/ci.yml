name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            contracts:
              - 'contracts/**'
      - name: Contract gate
        if: steps.filter.outputs.contracts == 'true'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          changed=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          echo "$changed"
          echo "$changed" | grep -q '^contracts/CHANGELOG.md$' || {
            echo "contracts/CHANGELOG.md must be updated when contracts change."
            exit 1
          }
      - name: No contract changes
        if: steps.filter.outputs.contracts != 'true'
        run: echo "No contract changes."

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            js:
              - 'package.json'
              - 'apps/**/package.json'
              - 'packages/**/package.json'
      - name: Skip
        if: steps.filter.outputs.js != 'true'
        run: echo "No JS packages detected."
      - name: Setup Node
        if: steps.filter.outputs.js == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        if: steps.filter.outputs.js == 'true'
        run: npm ci
      - name: Lint
        if: steps.filter.outputs.js == 'true'
        run: npm run lint --workspaces --if-present

  py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            py:
              - 'services/**/pyproject.toml'
              - 'services/**/requirements.txt'
              - 'services/**/*.py'
              - 'packages/flags/src/flags.py'
      - name: Skip
        if: steps.filter.outputs.py != 'true'
        run: echo "No Python changes."
      - name: Setup Python
        if: steps.filter.outputs.py == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        if: steps.filter.outputs.py == 'true'
        run: pip install ruff
      - name: Lint (ruff)
        if: steps.filter.outputs.py == 'true'
        run: ruff check services/ packages/flags/src/flags.py
      - name: Format check (ruff)
        if: steps.filter.outputs.py == 'true'
        run: ruff format --check services/ packages/flags/src/flags.py

  smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            tests:
              - 'tests/**'
              - 'services/**'
      - name: Skip
        if: steps.filter.outputs.tests != 'true'
        run: echo "No service or test changes."
      - name: Setup Python
        if: steps.filter.outputs.tests == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install service dependencies
        if: steps.filter.outputs.tests == 'true'
        run: |
          for req in services/*/requirements.txt; do
            echo "Installing $req"
            pip install -r "$req" --quiet
          done
      - name: Run smoke tests
        if: steps.filter.outputs.tests == 'true'
        env:
          FLAGS: "feature.temperature.thermal-profile"
        run: |
          if ls tests/*_smoke.py 1>/dev/null 2>&1; then
            pytest -v --tb=long -p no:warnings
          else
            echo "No smoke tests yet."
          fi
