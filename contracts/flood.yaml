openapi: "3.1.0"
info:
  title: Flood Risk Service
  version: "1.7.0"
  description: >
    Flood risk scoring from live data — Open-Meteo SRTM elevation + 5-year ERA5 daily
    precipitation, and OSM Overpass water-body proximity. Composite 0–100 score across
    elevation, hydrology, historical (rainfall), and low-lying-area components.
    Conservative fallbacks on upstream failure; no GEE dependency (gee_enabled=false).

servers:
  - url: http://localhost:8002
    description: Local dev

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: Service running
          content:
            application/json:
              schema:
                type: object
                required: [status, service]
                properties:
                  status:
                    type: string
                    example: "ok"
                  service:
                    type: string
                    example: "flood"

  /flood/analyze:
    post:
      operationId: analyzeFloodRisk
      summary: Flood risk score for a location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FloodRequest"
      responses:
        "200":
          description: Flood risk result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FloodReport"
        "403":
          description: Feature flag disabled
        "422":
          description: Validation error

components:
  schemas:
    FloodRequest:
      type: object
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        radius_meters:
          type: number
          format: float
          default: 1000

    RiskCategory:
      type: string
      enum: ["Very Low", "Low", "Moderate", "High", "Very High"]

    FloodComponentScores:
      type: object
      required: [elevation_risk, hydrology_risk, historical_risk, llai_risk]
      properties:
        elevation_risk:
          type: number
          format: float
          minimum: 0
          maximum: 100
        hydrology_risk:
          type: number
          format: float
          minimum: 0
          maximum: 100
        historical_risk:
          type: number
          format: float
          minimum: 0
          maximum: 100
        llai_risk:
          type: number
          format: float
          minimum: 0
          maximum: 100

    ElevationAnalysis:
      type: object
      required:
        [mean_m, min_m, max_m, range_m, slope_degrees, low_lying_area_pct, terrain_classification]
      properties:
        mean_m:
          type: number
          format: float
        min_m:
          type: number
          format: float
        max_m:
          type: number
          format: float
        range_m:
          type: number
          format: float
        slope_degrees:
          type: number
          format: float
        low_lying_area_pct:
          type: number
          format: float
        terrain_classification:
          type: string

    HydrologyAnalysis:
      type: object
      required:
        [flow_accumulation, nearest_river_distance_m, water_occurrence_pct, drainage_density, river_proximity_risk]
      properties:
        flow_accumulation:
          type: number
          format: float
        nearest_river_distance_m:
          type: number
          format: float
        water_occurrence_pct:
          type: number
          format: float
        drainage_density:
          type: number
          format: float
        river_proximity_risk:
          type: string

    FloodHistory:
      type: object
      required: [historical_events_count, annual_rainfall_mm, flood_history_score]
      properties:
        historical_events_count:
          type: integer
        annual_rainfall_mm:
          type: number
          format: float
        flood_history_score:
          type: number
          format: float

    LowLyingAreaIndex:
      type: object
      required: [mean, min, max, primary_risk_category]
      properties:
        mean:
          type: number
          format: float
        min:
          type: number
          format: float
        max:
          type: number
          format: float
        primary_risk_category:
          type: string

    FloodMetadata:
      type: object
      required: [latitude, longitude, radius_meters, data_source, gee_enabled]
      properties:
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        radius_meters:
          type: number
          format: float
        data_source:
          type: string
        gee_enabled:
          type: boolean

    FloodReport:
      type: object
      required:
        [
          overall_score,
          risk_category,
          component_scores,
          elevation,
          hydrology,
          flood_history,
          llai,
          recommendations,
          visualization_urls,
          metadata,
        ]
      properties:
        overall_score:
          type: number
          format: float
          minimum: 0
          maximum: 100
        risk_category:
          $ref: "#/components/schemas/RiskCategory"
        component_scores:
          $ref: "#/components/schemas/FloodComponentScores"
        elevation:
          $ref: "#/components/schemas/ElevationAnalysis"
        hydrology:
          $ref: "#/components/schemas/HydrologyAnalysis"
        flood_history:
          $ref: "#/components/schemas/FloodHistory"
        llai:
          $ref: "#/components/schemas/LowLyingAreaIndex"
        recommendations:
          type: array
          items:
            type: string
        visualization_urls:
          type: object
          additionalProperties:
            type: string
        metadata:
          $ref: "#/components/schemas/FloodMetadata"
