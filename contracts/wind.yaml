openapi: "3.1.0"
info:
  title: Wind Analysis Service
  version: "1.1.0"
  description: Wind analysis with deterministic fallback and ERA5-Land-ready placeholders.

servers:
  - url: http://localhost:8003
    description: Local dev

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      responses:
        "200":
          description: Service running
          content:
            application/json:
              schema:
                type: object
                required: [status, service]
                properties:
                  status:
                    type: string
                    example: "ok"
                  service:
                    type: string
                    example: "wind"

  /wind/analyze:
    post:
      operationId: analyzeWind
      summary: Wind analysis for a location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WindRequest"
      responses:
        "200":
          description: Wind analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WindAnalysis"
        "403":
          description: Feature flag disabled
        "422":
          description: Validation error

components:
  schemas:
    WindRequest:
      type: object
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        radius_meters:
          type: number
          format: float
          default: 1000

    Orientation:
      type: string
      enum: [North, Northeast, East, Southeast, South, Southwest, West, Northwest]

    ComfortLevel:
      type: string
      enum: [Poor, Fair, Good, Excellent]

    WindLoadRisk:
      type: string
      enum: [Low, Moderate, High, "Very High"]

    SeasonalAnalysis:
      type: object
      required: [summer, monsoon, winter]
      properties:
        summer:
          type: number
          format: float
        monsoon:
          type: number
          format: float
        winter:
          type: number
          format: float

    ComfortAnalysis:
      type: object
      required: [pedestrian_comfort, natural_ventilation_potential, outdoor_usability]
      properties:
        pedestrian_comfort:
          $ref: "#/components/schemas/ComfortLevel"
        natural_ventilation_potential:
          $ref: "#/components/schemas/ComfortLevel"
        outdoor_usability:
          $ref: "#/components/schemas/ComfortLevel"

    BuildingImpact:
      type: object
      required: [cross_ventilation_score, wind_load_risk, recommended_orientation]
      properties:
        cross_ventilation_score:
          type: number
          format: float
          minimum: 0
          maximum: 100
        wind_load_risk:
          $ref: "#/components/schemas/WindLoadRisk"
        recommended_orientation:
          $ref: "#/components/schemas/Orientation"

    WindMetadata:
      type: object
      required: [latitude, longitude, radius_meters, data_source]
      properties:
        latitude:
          type: number
          format: float
        longitude:
          type: number
          format: float
        radius_meters:
          type: number
          format: float
        data_source:
          type: string

    WindAnalysis:
      type: object
      required:
        [
          average_wind_speed,
          max_wind_speed,
          prevailing_direction,
          wind_category,
          gust_risk,
          seasonal_analysis,
          comfort_analysis,
          building_impact,
          recommendations,
          metadata,
        ]
      properties:
        average_wind_speed:
          type: number
          format: float
        max_wind_speed:
          type: number
          format: float
        prevailing_direction:
          $ref: "#/components/schemas/Orientation"
        wind_category:
          type: string
        gust_risk:
          type: string
        seasonal_analysis:
          $ref: "#/components/schemas/SeasonalAnalysis"
        comfort_analysis:
          $ref: "#/components/schemas/ComfortAnalysis"
        building_impact:
          $ref: "#/components/schemas/BuildingImpact"
        recommendations:
          type: array
          items:
            type: string
        metadata:
          $ref: "#/components/schemas/WindMetadata"
          properties:
            lat:
              type: number
            lon:
              type: number
        annual_prevailing_direction:
          type: string
        annual_architectural_advice:
          type: object
          additionalProperties:
            type: string
        annual_wind_rose:
          type: array
          items:
            $ref: "#/components/schemas/WindFrequencyBin"
          minItems: 16
          maxItems: 16
        seasonal_data:
          type: array
          items:
            $ref: "#/components/schemas/SeasonalWindData"
          minItems: 4
          maxItems: 4
