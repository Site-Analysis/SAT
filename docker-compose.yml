      interval: 30s
      timeout: 5s
      retries: 3

  # Self-hosted Overpass mirror (Southern Zone PBF). OSM-backed services
  # (geo, infrastructure, planning, flood, sunpath) route OVERPASS_URL here in prod
  # to avoid public-mirror rate limits — see infra/DEPLOY.md. First run uses
  # OVERPASS_MODE=init (downloads + imports the PBF; ~20 min); the prod overlay
  # switches it to OVERPASS_MODE=run (re-init would wipe the DB).
  overpass:
    image: wiktorn/overpass-api:latest
    ports:
      - "12345:80"
    environment:
      - OVERPASS_MODE=init
      - OVERPASS_PLANET_URL=https://download.geofabrik.de/asia/india/southern-zone-latest.osm.pbf
      - OVERPASS_DIFF_URL=https://download.geofabrik.de/asia/india/southern-zone-updates/
      - OVERPASS_META=no
      - OVERPASS_RULES_LOAD=10
      - OVERPASS_COMPRESSION=lz4
    volumes:
      - overpass-db:/db
    healthcheck:
      test: ["CMD-SHELL", "curl -fs 'http://localhost/api/interpreter?data=[out:json];out;' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 1200s

volumes:
  overpass-db:
